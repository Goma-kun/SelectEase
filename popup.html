<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, sans-serif;
      width: 220px;
      padding: 14px 16px;
      margin: 0;
      color: #222;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 12px;
      font-weight: 600;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    label {
      font-size: 13px;
    }
    .toggle {
      position: relative;
      width: 38px;
      height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #4c8ef7; }
    input:checked + .slider::before { transform: translateX(16px); }
  </style>
</head>
<body>
  <h2>SelectEase</h2>
  <div class="row">
    <label for="autoCopy">自動コピー</label>
    <label class="toggle">
      <input type="checkbox" id="autoCopy" checked>
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
